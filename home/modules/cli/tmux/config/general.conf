# Set prefix to C-b (unused; we use a modal system via C-g instead)
# tmux requires a prefix key, but we clear all its bindings below
set -g prefix C-b

# Clear all default keybindings from the prefix table
unbind-key -a -T prefix

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# No delay after pressing Escape (important for modal keybinds)
set -sg escape-time 0

# Enable mouse support
set -g mouse on

# Larger scrollback buffer
set -g history-limit 10000

# Use 256 colors
set -g default-terminal "tmux-256color"

# Use vi keys in copy mode
setw -g mode-keys vi
