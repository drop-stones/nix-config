# Tokyo Night color palette
# bg:      #1a1b26
# fg:      #c0caf5
# blue:    #7aa2f7
# cyan:    #2ac3de
# magenta: #bb9af7
# orange:  #ff9e64
# muted:   #383e5a
# gray:    #565f89

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: mode indicator (hidden in root/locked mode)
set -g status-left "#{?#{==:#{client_key_table},root},, #[bg=#ff9e64,fg=#1a1b26] #{client_key_table} #[default] }"
set -g status-left-length 20

# Right: session name
set -g status-right "#[bg=#383e5a,fg=#c0caf5] #S "

# Window status format
setw -g window-status-format " #I:#W "
setw -g window-status-style "bg=#1a1b26,fg=#565f89"
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bg=#383e5a,fg=#7aa2f7"

# Pane border colors
set -g pane-border-style "fg=#383e5a"
set -g pane-active-border-style "fg=#7aa2f7"

# Message/command prompt colors
set -g message-style "bg=#1a1b26,fg=#c0caf5"
