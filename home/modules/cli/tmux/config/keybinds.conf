# Modal keybinding system (zellij-inspired)
#
# Root table = locked mode (all input goes to the terminal, status hidden)
# Ctrl+g enters "normal" mode (status bar appears with mode indicator)
# Enter/Escape/Ctrl+g returns to root (status bar hides)

# ── Entry point ──────────────────────────────────────────────
bind -n C-g set @mode "󰌌 NORMAL" \; set status on \; switch-client -T normal

# ── Normal mode ──────────────────────────────────────────────
# Pane navigation (stay in normal mode, zoom-aware)
bind -T normal h select-pane -LZ \; switch-client -T normal
bind -T normal j select-pane -DZ \; switch-client -T normal
bind -T normal k select-pane -UZ \; switch-client -T normal
bind -T normal l select-pane -RZ \; switch-client -T normal

# Window navigation (stay in normal mode)
bind -T normal H previous-window \; switch-client -T normal
bind -T normal L next-window \; switch-client -T normal

# Switch to sub-modes
bind -T normal p set @mode "󰕰 PANE" \; switch-client -T pane
bind -T normal r set @mode "󰩨 RESIZE" \; switch-client -T resize
bind -T normal t set @mode "󰓩 TAB" \; switch-client -T tab
bind -T normal s set @mode "󰦨 SCROLL" \; copy-mode
bind -T normal o set @mode "󰒍 SESSION" \; switch-client -T session

# Return to root (locked)
bind -T normal Enter set status off \; switch-client -T root
bind -T normal Escape set status off \; switch-client -T root
bind -T normal C-g set status off \; switch-client -T root

# ── Pane mode ────────────────────────────────────────────────
# Navigate (stay in pane mode, zoom-aware)
bind -T pane h select-pane -LZ \; switch-client -T pane
bind -T pane j select-pane -DZ \; switch-client -T pane
bind -T pane k select-pane -UZ \; switch-client -T pane
bind -T pane l select-pane -RZ \; switch-client -T pane

# Create panes (return to root after action)
bind -T pane s split-window -v -c "#{pane_current_path}" \; set status off
bind -T pane v split-window -h -c "#{pane_current_path}" \; set status off

# Close pane
bind -T pane d kill-pane \; set status off

# Zoom (fullscreen toggle)
bind -T pane f resize-pane -Z \; set status off

# Toggle floating pane (stores parent session name for cross-session commands)
bind -T pane w set status off \; if-shell -F '#{==:#{session_name},floating}' \
  { detach-client } \
  { display-popup -d "#{pane_current_path}" -w 50% -h 50% -E \
      "tmux new-session -d -s floating 2>/dev/null; tmux set-option -t floating @parent '#{session_name}' 2>/dev/null; tmux set-option -t floating status off 2>/dev/null; tmux set-option -t floating key-table floating-root 2>/dev/null; tmux attach-session -t floating" }

# Return to root
bind -T pane Enter set status off \; switch-client -T root
bind -T pane Escape set status off \; switch-client -T root
bind -T pane C-g set status off \; switch-client -T root

# ── Resize mode ──────────────────────────────────────────────
bind -T resize h resize-pane -L 2 \; switch-client -T resize
bind -T resize j resize-pane -D 2 \; switch-client -T resize
bind -T resize k resize-pane -U 2 \; switch-client -T resize
bind -T resize l resize-pane -R 2 \; switch-client -T resize

# Return to root
bind -T resize Enter set status off \; switch-client -T root
bind -T resize Escape set status off \; switch-client -T root
bind -T resize C-g set status off \; switch-client -T root

# ── Tab (window) mode ────────────────────────────────────────
bind -T tab h previous-window \; switch-client -T tab
bind -T tab l next-window \; switch-client -T tab
bind -T tab n new-window -c "#{pane_current_path}" \; set status off
bind -T tab d kill-window \; set status off
bind -T tab r command-prompt -I "#W" "rename-window '%%'" \; set status off

# Return to root
bind -T tab Enter set status off \; switch-client -T root
bind -T tab Escape set status off \; switch-client -T root
bind -T tab C-g set status off \; switch-client -T root

# ── Session mode ─────────────────────────────────────────────
bind -T session d detach-client \; set status off
bind -T session w choose-tree -Zs -f '#{?#{m:floating,#{session_name}},0,1}' \; set status off
bind -T session n command-prompt -p "new session:" "new-session -s '%%'" \; set status off
bind -T session r command-prompt -I "#S" "rename-session '%%'" \; set status off

# Return to root
bind -T session Enter set status off \; switch-client -T root
bind -T session Escape set status off \; switch-client -T root
bind -T session C-g set status off \; switch-client -T root

# ── Copy/scroll mode (vi keybindings) ────────────────────────
bind -T copy-mode-vi v send-keys -X rectangle-off \; send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-on \; send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi i send-keys -X cancel \; set status off
bind -T copy-mode-vi q send-keys -X cancel \; set status off
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up

# ── Floating session keybindings ─────────────────────────────
# Floating session uses "floating-root" as its default key table.
# C-g opens floating-cmd, which allows:
#   p -> w : close floating pane
#   t      : tab operations forwarded to parent session
# All other keys pass through to the shell.

bind -T floating-root C-g switch-client -T floating-cmd
bind -T floating-cmd Enter switch-client -T floating-root
bind -T floating-cmd Escape switch-client -T floating-root
bind -T floating-cmd C-g switch-client -T floating-root

# Pane: only toggle floating (close)
bind -T floating-cmd p switch-client -T floating-pane
bind -T floating-pane w detach-client
bind -T floating-pane Enter switch-client -T floating-root
bind -T floating-pane Escape switch-client -T floating-root

# Tab: forwarded to parent session
bind -T floating-cmd t switch-client -T floating-tab
bind -T floating-tab h run-shell 'tmux previous-window -t "$(tmux show-option -qv @parent)"' \; switch-client -T floating-tab
bind -T floating-tab l run-shell 'tmux next-window -t "$(tmux show-option -qv @parent)"' \; switch-client -T floating-tab
bind -T floating-tab n run-shell 'tmux new-window -t "$(tmux show-option -qv @parent)"'
bind -T floating-tab Enter switch-client -T floating-root
bind -T floating-tab Escape switch-client -T floating-root
