# Modal keybinding system (zellij-inspired)
#
# Root table = locked mode (all input goes to the terminal)
# Ctrl+g enters "normal" mode, then single keys switch sub-modes
# Enter/Escape always returns to root (locked)

# ── Entry point ──────────────────────────────────────────────
bind -n C-g switch-client -T normal

# ── Normal mode ──────────────────────────────────────────────
# Pane navigation (stay in normal mode for continuous movement)
bind -T normal h select-pane -L \; switch-client -T normal
bind -T normal j select-pane -D \; switch-client -T normal
bind -T normal k select-pane -U \; switch-client -T normal
bind -T normal l select-pane -R \; switch-client -T normal

# Window navigation (stay in normal mode)
bind -T normal H previous-window \; switch-client -T normal
bind -T normal L next-window \; switch-client -T normal

# Switch to sub-modes
bind -T normal p switch-client -T pane
bind -T normal r switch-client -T resize
bind -T normal t switch-client -T tab
bind -T normal s copy-mode
bind -T normal o switch-client -T session

# Return to root (locked)
bind -T normal Enter switch-client -T root
bind -T normal Escape switch-client -T root

# ── Pane mode ────────────────────────────────────────────────
# Navigate (stay in pane mode)
bind -T pane h select-pane -L \; switch-client -T pane
bind -T pane j select-pane -D \; switch-client -T pane
bind -T pane k select-pane -U \; switch-client -T pane
bind -T pane l select-pane -R \; switch-client -T pane

# Create panes (return to root after action)
bind -T pane s split-window -v -c "#{pane_current_path}"
bind -T pane v split-window -h -c "#{pane_current_path}"

# Close pane
bind -T pane d kill-pane

# Zoom (fullscreen toggle)
bind -T pane f resize-pane -Z

# Toggle floating pane (persistent popup session)
# - From main session: opens popup attached to a "floating" background session
# - From inside popup: detaches (closes popup), state is preserved for next open
bind -T pane w if-shell -F '#{==:#{session_name},floating}' \
  { detach-client } \
  { display-popup -d "#{pane_current_path}" -w 80% -h 80% -E \
    "tmux attach-session -t floating 2>/dev/null || tmux new-session -s floating" }

# Return to root
bind -T pane Enter switch-client -T root
bind -T pane Escape switch-client -T root

# ── Resize mode ──────────────────────────────────────────────
# Resize (stay in resize mode for continuous adjustment)
bind -T resize h resize-pane -L 2 \; switch-client -T resize
bind -T resize j resize-pane -D 2 \; switch-client -T resize
bind -T resize k resize-pane -U 2 \; switch-client -T resize
bind -T resize l resize-pane -R 2 \; switch-client -T resize

# Return to root
bind -T resize Enter switch-client -T root
bind -T resize Escape switch-client -T root

# ── Tab (window) mode ────────────────────────────────────────
# Navigate (stay in tab mode)
bind -T tab h previous-window \; switch-client -T tab
bind -T tab l next-window \; switch-client -T tab

# New / close window
bind -T tab n new-window -c "#{pane_current_path}"
bind -T tab d kill-window

# Rename window
bind -T tab r command-prompt -I "#W" "rename-window '%%'"

# Return to root
bind -T tab Enter switch-client -T root
bind -T tab Escape switch-client -T root

# ── Session mode ─────────────────────────────────────────────
bind -T session d detach-client
bind -T session w choose-tree -Zs -f '#{?#{m:floating,#{session_name}},0,1}'

# Return to root
bind -T session Enter switch-client -T root
bind -T session Escape switch-client -T root
