# Minimal status bar (Tokyo Night)
# Hidden in root (locked) mode, shown when entering a mode

set -g status off
set -g status-position bottom
set -g status-interval 3
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 60

# Left: session name │ mode
set -g status-left "#[fg=#565f89] 󰆍 #S #[fg=#414868]│ #[fg=#7aa2f7]#{@mode} #[fg=#414868]│#[default] "

# Right: directory │ time (home directory shown as ~)
set -g status-right " #[fg=#414868]│ #[fg=#565f89]󰉋 #(echo '#{pane_current_path}' | sed \"s|$HOME|~|\") #[fg=#414868]│ #[fg=#565f89]󰥔 %H:%M "

# Window list
setw -g window-status-format "#[fg=#565f89] #W "
setw -g window-status-current-format "#[fg=#7aa2f7] #W "
setw -g window-status-separator ""
